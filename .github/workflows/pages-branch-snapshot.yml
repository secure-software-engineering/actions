name: Deploy Snapshot to GitHub Pages

on:
  workflow_call:
    inputs:
      deploy_branch:
        required: true
        type: string
      version:
        required: false
        type: string
        default: "maven"

permissions:
  contents: write
  pages: write
  deployments: write

jobs:
  deploy-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Debug GitHub Variables
        run: env | grep GITHUB_

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: pip install mike mkdocs-material mkdocs-tooltips git+https://github.com/RedisLabs/mkdocs-include.git git+https://github.com/swissiety/LspLexer4Pygments.git

      - name: Determine Version
        run: |
          if [ "${{ inputs.version }}" == "maven" ]; then
            VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed "s/[^a-zA-Z0-9._-]/_/g")
          elif [ "${{ inputs.version }}" == "gradle" ]; then
            VERSION=$(gradle properties | grep "^version:" | awk '{print $2}')
          else
            VERSION=${{ inputs.version }}  # Use manually provided version
          fi
          echo "DOC_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Deploy Snapshot
        run: |
          echo "Deploying documentation snapshot for branch: ${{ inputs.deploy_branch }}"

          if [ "${{ inputs.deploy_branch }}" == "develop" ]; then
            echo "Deploying to 'develop' branch with alias 'latest'..."
            mike deploy develop --push --update-aliases develop latest

          elif [[ "${{ inputs.deploy_branch }}" == release/* ]]; then
            BRANCH_NAME=$(echo "${{ inputs.deploy_branch }}" | sed 's/release\///g')
            echo "Deploying to release branch: $BRANCH_NAME"
            mike deploy "$BRANCH_NAME" --push --update-aliases "$BRANCH_NAME"

          else
            echo "ERROR: Unsupported branch '${{ inputs.deploy_branch }}'. Exiting."
            exit 1
          fi
            echo "Deployment completed successfully!"