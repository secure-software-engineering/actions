name: Documentation Preview
description: handle preview of the documentation

inputs:
  title:
    description: 'The title of the preview - as shown on the version selector'
    required: false
    default: ''         # if not set we use the pr number
  pages-branch:
    description: 'The branch name where the gh pages are deployed to (default: gh-pages)'
    required: false
    default: 'gh-pages'
  enable-comment:
    description: 'If true a comment with a link to the preview is added to the PR (default: true)'
    required: false
    default: 'true'
  latest-name:
    description: 'latest version to find the changed pages'
    required: false
    default: 'latest'

runs:
  using: composite
  steps:
    - name: Configuration
      shell: bash
      run: |
        echo 'name="pr-${{ github.event.pull_request.number }}"' >> $GITHUB_ENV
        echo 'base-url="https://$OWNER.github.io/$REPO/"'
        
        if [ -z "${{ inputs.title }}" ]; then
          echo "title=Preview for PR-${{ github.event.pull_request.number }}" >> $GITHUB_ENV
        else
          echo "title=${{ inputs.title }}" >> $GITHUB_ENV
        fi

      env:
        REPO: ${{ github.event.repository.name }}
        OWNER: ${{ github.repository_owner }}

    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x

    - name: Install dependencies
      shell: bash
      run: pip install -r documentation/requirements.txt

    - name: Configure git user
      shell: bash
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Deploy the Preview
      shell: bash
      run: mike deploy --branch ${{ inputs.pages-branch }} --push -t "${{ env.title }}" ${{ env.name }}

    - name: summarize changed files to create links to the updated pages
      if: inputs.enable-comment == 'true' && github.event.action != 'closed'
      shell: bash
      id: diff
      run: |
        DIFF=$(diff -qr "latest" "${name}" | grep '\.html' || true)
        
        CHANGES=""
        ADDITIONS=""
        DELETIONS=""
        
        while IFS= read -r line; do
          if [[ $line == Files* ]]; then
            # Modified file
            FILE_PATH=$(echo "$line" | sed -E "s|.* and ${name}/(.*) differ|\1|")
            URL="${base_url}/${FILE_PATH}"
            CHANGES+="- [$FILE_PATH]($URL)"$'\n'
          elif [[ $line == Only\ in\ ${name}:* ]]; then
            # Added file
            FILE_PATH=$(echo "$line" | sed -E "s|Only in ${name}: ||")
            URL="${base_url}/${FILE_PATH}"
            ADDITIONS+="- [$FILE_PATH]($URL)"$'\n'
          elif [[ $line == Only\ in\ latest:* ]]; then
            # Deleted file
            FILE_PATH=$(echo "$line" | sed -E "s|Only in latest: ||")
            DELETIONS+="- ~~${FILE_PATH}~~ (deleted)"$'\n'
          fi
        done <<< "$DIFF"
        
        # Create summary
        SUMMARY=""
        [[ -n "$ADDITIONS" ]] && SUMMARY+="*New*\n$ADDITIONS\n"
        [[ -n "$CHANGES" ]] && SUMMARY+="*Modified*\n$CHANGES\n"
        [[ -n "$DELETIONS" ]] && SUMMARY+="*Deleted*\n$DELETIONS\n"
        [[ -n "$SUMMARY" ]] && SUMMARY+="No content changes found in sites. Likely a change in design,js etc.\n"
        
        echo "summary<<EOF" >> "$GITHUB_OUTPUT"
        echo "$SUMMARY" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Comment Link to Preview
      if: inputs.enable-comment == 'true' && github.event.action != 'closed'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        recreate: true
        message: |
          Documentation was updated: [Preview](${{ env.base-url}}/${{ env.name }}/)
          ${{ steps.diff.outputs.summary }}

    - name: Delete the Preview
      if: github.event.action == 'closed'
      shell: bash
      run: mike delete --push ${{ env.name }}
