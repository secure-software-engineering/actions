name: Handle Documentation Preview
description: 'Creates and manages documentation previews for pull requests'

inputs:
  enable_comment:
    description: 'Whether to add a comment to the PR with the preview link'
    required: false
    default: 'true'
  title_prefix:
    description: 'Prefix for the preview title'
    required: false
    default: "PR Preview: "
  token:
    description: 'GitHub token for authentication'
    required: true
  event_action:
    description: 'The action that triggered the event (e.g., opened, closed)'
    required: true
  head_ref:
    description: 'The head ref or source branch of the pull request'
    required: true
  repository_owner:
    description: 'The owner of the repository'
    required: true
  repository_name:
    description: 'The name of the repository'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        token: ${{ inputs.token }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x

    - name: Install Dependencies
      shell: bash
      run: pip install mike mkdocs-material mkdocs-tooltips git+https://github.com/RedisLabs/mkdocs-include.git git+https://github.com/swissiety/LspLexer4Pygments.git

    - name: Set PR Version Name
      shell: bash
      run: echo "DOC_VERSION_NAME=$(echo ${{ inputs.head_ref }} | sed 's/[^a-zA-Z0-9._-]/_/g')" >> $GITHUB_ENV

    - name: Deploy Doc in Subdirectory
      if: inputs.event_action != 'closed'
      shell: bash
      run: |
        PREFIX="${{ inputs.title_prefix}}"
        TITLE="$PREFIX${{ env.DOC_VERSION_NAME }}"
        
        echo "Deploying documentation with title: $TITLE"
        mike deploy "${{ env.DOC_VERSION_NAME }}_preview" -t "$TITLE" --push
        mike props "${{ env.DOC_VERSION_NAME }}_preview" --set-string hidden=true --push

    - name: Comment Link to Preview
      if: inputs.enable_comment == 'true' && inputs.event_action != 'closed'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        token: ${{ inputs.token }}
        message: |
          [Documentation Preview](https://${{ inputs.repository_owner }}.github.io/${{ inputs.repository_name }}/${{ env.DOC_VERSION_NAME }}_preview/).

    - name: Delete PR Preview on Close
      if: inputs.event_action == 'closed'
      shell: bash
      run: mike delete "${{ env.DOC_VERSION_NAME }}_preview" --push