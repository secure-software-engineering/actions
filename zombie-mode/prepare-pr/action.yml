name: 'Zombie Prepare Release'
description: 'Create a release PR from base-branch to target-branch on a scheduled cadence'

# Intended use: call this action N days before your release date (see README for cron examples).
# If commits exist on base-branch not yet in target-branch, a versioned release PR is opened.
# If a zombie-mode PR is already open, a reminder comment is added instead.

inputs:
  token:
    description: 'GitHub token for authentication'
    required: true
  base-branch:
    description: 'Branch with unreleased changes (PR source)'
    required: false
    default: 'develop'
  target-branch:
    description: 'Branch the release PR merges into'
    required: false
    default: 'main'
  version-bump:
    description: |
      Semver component to increment: patch | minor | major.
      Wire an external compat-check action (see README) and pass its output here for automatic
      semantic versioning. Defaults to patch when no compat-check is configured.
    required: false
    default: 'patch'
  auto-merge-days:
    description: |
      Days shown in the PR description as the auto-merge deadline.
      Actual auto-merge is performed by the merge-pr action, not here.
    required: false
    default: ''
  lead-days:
    description: 'Informational: days before release date this action is expected to run (shown in PR body)'
    required: false
    default: '14'
  version-file:
    description: 'Version file to update (currently only pom.xml is supported for automatic bumping)'
    required: false
    default: 'pom.xml'
  java-version:
    description: 'Java version for Maven version update (only used when version-file is pom.xml)'
    required: false
    default: '17'
  java-distribution:
    description: 'Java distribution for Maven version update'
    required: false
    default: 'temurin'

outputs:
  release-created:
    description: 'true when a new release PR was opened, false when skipped'
    value: ${{ steps.consolidate.outputs.release-created }}
  new-version:
    description: 'Version string of the created release (e.g. 1.3.0), empty when skipped'
    value: ${{ steps.consolidate.outputs.new-version }}
  pr-number:
    description: 'Number of the created PR, empty when skipped'
    value: ${{ steps.consolidate.outputs.pr-number }}
  skipped-reason:
    description: 'Human-readable reason when release-created=false (no-changes | existing-pr-N)'
    value: ${{ steps.consolidate.outputs.skipped-reason }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Configure git user
      shell: bash
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    # Setup Java/Maven only when we may need to update pom.xml
    - name: Set up Java
      if: inputs.version-file == 'pom.xml'
      uses: actions/setup-java@v4
      with:
        distribution: ${{ inputs.java-distribution }}
        java-package: jdk
        java-version: ${{ inputs.java-version }}

    # Compare branches via git; no external state needed
    - name: Detect unreleased changes
      id: detect_changes
      shell: bash
      run: |
        git fetch origin "${{ inputs.target-branch }}" "${{ inputs.base-branch }}"
        COMMIT_COUNT=$(git log "origin/${{ inputs.target-branch }}..origin/${{ inputs.base-branch }}" --oneline | wc -l)
        echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
        echo "Commits on ${{ inputs.base-branch }} not in ${{ inputs.target-branch }}: $COMMIT_COUNT"

    - name: Skip — no unreleased changes
      if: steps.detect_changes.outputs.commit_count == '0'
      shell: bash
      run: |
        echo "No changes between ${{ inputs.base-branch }} and ${{ inputs.target-branch }}, nothing to release."
        echo "ZOMBIE_RELEASE_CREATED=false"     >> $GITHUB_ENV
        echo "ZOMBIE_SKIPPED_REASON=no-changes" >> $GITHUB_ENV

    # Calculate next version from the highest semver tag.
    # Using --sort=-version:refname instead of git describe so version-sort is correct (1.9 < 1.10)
    # and we are not misled by tags on unrelated branches.
    - name: Calculate next version
      if: steps.detect_changes.outputs.commit_count != '0'
      id: version
      shell: bash
      run: |
        LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
        LATEST_TAG=${LATEST_TAG:-v0.0.0}
        echo "Latest tag: $LATEST_TAG"

        VERSION=${LATEST_TAG#v}
        MAJOR=$(echo "$VERSION" | cut -d. -f1)
        MINOR=$(echo "$VERSION" | cut -d. -f2)
        PATCH=$(echo "$VERSION" | cut -d. -f3)

        case "${{ inputs.version-bump }}" in
          major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
          minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
          *)     NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;  # patch (default)
        esac

        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "latest_tag=$LATEST_TAG"   >> $GITHUB_OUTPUT
        echo "Next version: $NEW_VERSION (bump: ${{ inputs.version-bump }})"

    # Search by label + target-branch only — not by exact head-branch name.
    # This catches any open zombie PR regardless of version, preventing duplicate PRs
    # when a previous run created a PR for an older version.
    - name: Check for existing open zombie-mode PR
      if: steps.detect_changes.outputs.commit_count != '0'
      id: check_existing_pr
      shell: bash
      run: |
        EXISTING_PR=$(gh pr list \
          --base "${{ inputs.target-branch }}" \
          --label "zombie-mode" \
          --state open \
          --json number \
          --jq '.[0].number // empty')

        if [[ -n "$EXISTING_PR" ]]; then
          echo "pr_exists=true"            >> $GITHUB_OUTPUT
          echo "existing_pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          echo "Existing zombie-mode PR found: #$EXISTING_PR"
        else
          echo "pr_exists=false" >> $GITHUB_OUTPUT
        fi
      env:
        GH_TOKEN: ${{ inputs.token }}

    - name: Comment reminder on existing PR and skip
      if: >
        steps.detect_changes.outputs.commit_count != '0' &&
        steps.check_existing_pr.outputs.pr_exists == 'true'
      shell: bash
      run: |
        PR_NUMBER="${{ steps.check_existing_pr.outputs.existing_pr_number }}"
        gh pr comment "$PR_NUMBER" \
          --body "Reminder: this zombie-mode release PR is still open. Triggered by scheduled workflow on $(date -u '+%Y-%m-%d'). Please review and merge to proceed with the release."
        echo "Commented on existing PR #$PR_NUMBER, skipping new PR creation."
        echo "ZOMBIE_RELEASE_CREATED=false"                   >> $GITHUB_ENV
        echo "ZOMBIE_SKIPPED_REASON=existing-pr-${PR_NUMBER}" >> $GITHUB_ENV
      env:
        GH_TOKEN: ${{ inputs.token }}

    # Branch from base-branch tip. Cleans up stale remote branch from a previous failed run.
    - name: Create release branch and update version
      if: >
        steps.detect_changes.outputs.commit_count != '0' &&
        steps.check_existing_pr.outputs.pr_exists == 'false'
      shell: bash
      run: |
        NEW_VERSION="${{ steps.version.outputs.new_version }}"
        BRANCH_NAME="zombie-release-v${NEW_VERSION}"

        # Remove stale remote branch if present from a previous interrupted run
        if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
          echo "Removing stale remote branch $BRANCH_NAME..."
          git push origin --delete "$BRANCH_NAME" || echo "Could not delete stale remote branch, continuing"
        fi

        git checkout -b "$BRANCH_NAME" "origin/${{ inputs.base-branch }}"

        # Update pom.xml using Maven; pattern mirrors version/action.yml for multi-module support
        if [[ "${{ inputs.version-file }}" == "pom.xml" ]] && [ -f "pom.xml" ]; then
          if command -v mvn &>/dev/null; then
            mvn versions:set -DnewVersion="${NEW_VERSION}" -DgenerateBackupPoms=false
            git ls-files | grep 'pom.xml$' | xargs git add
            git commit --allow-empty -m "Bump version to ${NEW_VERSION}"
          else
            echo "Maven not on PATH, skipping pom.xml version update"
          fi
        fi

        git push origin "$BRANCH_NAME"
        echo "RELEASE_BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

    - name: Create release PR
      if: >
        steps.detect_changes.outputs.commit_count != '0' &&
        steps.check_existing_pr.outputs.pr_exists == 'false'
      id: create_pr
      shell: bash
      run: |
        NEW_VERSION="${{ steps.version.outputs.new_version }}"
        LATEST_TAG="${{ steps.version.outputs.latest_tag }}"
        BRANCH_NAME="zombie-release-v${NEW_VERSION}"

        # All commits on base-branch not yet in target-branch
        CHANGES=$(git log "origin/${{ inputs.target-branch }}..origin/${{ inputs.base-branch }}" \
          --pretty=format:"- %s" | head -30)

        # Auto-merge note in PR body (informational; actual merge handled by merge-pr action)
        if [[ -n "${{ inputs.auto-merge-days }}" ]]; then
          # GNU date required (ubuntu-latest provides this)
          MERGE_DATE=$(date -u -d "+${{ inputs.auto-merge-days }} days" '+%Y-%m-%d')
          AUTO_MERGE_NOTE="Auto-merge scheduled: ${MERGE_DATE} (+${{ inputs.auto-merge-days }} days)"
        else
          AUTO_MERGE_NOTE="Auto-merge: disabled — manual merge required"
        fi

        # Write PR body to temp file to avoid quoting issues with multiline content
        PR_BODY_FILE=$(mktemp)
        cat > "$PR_BODY_FILE" << PREOF
## Zombie Release: v${NEW_VERSION}

Changes on \`${{ inputs.base-branch }}\` since ${LATEST_TAG}:

${CHANGES}

---
${AUTO_MERGE_NOTE}
Lead time: ${{ inputs.lead-days }} days
Version bump: ${{ inputs.version-bump }}
PREOF

        PR_NUMBER=$(gh pr create \
          --title "Zombie Release: v${NEW_VERSION}" \
          --body-file "$PR_BODY_FILE" \
          --base "${{ inputs.target-branch }}" \
          --head "$BRANCH_NAME" \
          --label "zombie-mode,dependencies,auto-merge" \
          --json number \
          --jq '.number')

        rm "$PR_BODY_FILE"

        echo "Created release PR #$PR_NUMBER for v${NEW_VERSION}"
        echo "ZOMBIE_RELEASE_CREATED=true"         >> $GITHUB_ENV
        echo "ZOMBIE_RELEASE_VERSION=$NEW_VERSION" >> $GITHUB_ENV
        echo "ZOMBIE_RELEASE_PR=$PR_NUMBER"         >> $GITHUB_ENV
      env:
        GH_TOKEN: ${{ inputs.token }}

    # Single output source — reads GITHUB_ENV vars set by whichever branch ran above.
    # Runs unconditionally so outputs are always populated.
    - name: Consolidate outputs
      id: consolidate
      if: always()
      shell: bash
      run: |
        echo "release-created=${ZOMBIE_RELEASE_CREATED:-false}" >> $GITHUB_OUTPUT
        echo "new-version=${ZOMBIE_RELEASE_VERSION:-}"          >> $GITHUB_OUTPUT
        echo "pr-number=${ZOMBIE_RELEASE_PR:-}"                 >> $GITHUB_OUTPUT
        echo "skipped-reason=${ZOMBIE_SKIPPED_REASON:-}"        >> $GITHUB_OUTPUT
