name: 'Zombie Release'
description: 'Automatically create release PRs when dependency updates accumulate'

inputs:
  token:
    description: 'GitHub token for authentication'
    required: true
  base-branch:
    description: 'Base branch to create release PR against'
    required: false
    default: 'main'
  auto-merge-days:
    description: 'Number of days before auto-merge (for PR description)'
    required: false
    default: '3'
  version-file:
    description: 'Version file to update (pom.xml, package.json, etc.)'
    required: false
    default: 'pom.xml'

outputs:
  release-created:
    description: 'Whether a release PR was created'
    value: ${{ steps.create-pr.outputs.release-created }}
  new-version:
    description: 'The new version that was created'
    value: ${{ steps.version.outputs.new_version }}
  pr-number:
    description: 'The PR number of the created release'
    value: ${{ steps.create-pr.outputs.pr-number }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configure git user
      shell: bash
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

    - name: Get latest release
      id: latest_release
      shell: bash
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        echo "Latest release: $LATEST_TAG"

    - name: Check for dependency updates since last release
      id: check_updates
      shell: bash
      run: |
        if [[ "${{ steps.latest_release.outputs.latest_tag }}" == "v0.0.0" ]]; then
          echo "No previous releases found, will create initial release"
          echo "dependency_commits=1" >> $GITHUB_OUTPUT
        else
          echo "Checking commits since ${{ steps.latest_release.outputs.latest_tag }}"
          DEPENDENCY_COMMITS=$(git log ${{ steps.latest_release.outputs.latest_tag }}..HEAD --oneline --grep="Bump\|dependabot" | wc -l)
          echo "dependency_commits=$DEPENDENCY_COMMITS" >> $GITHUB_OUTPUT
        fi
        
        echo "Dependency commits found: ${{ steps.check_updates.outputs.dependency_commits }}"

    - name: Calculate next version
      if: steps.check_updates.outputs.dependency_commits > 0
      id: version
      shell: bash
      run: |
        LATEST_TAG="${{ steps.latest_release.outputs.latest_tag }}"
        if [[ $LATEST_TAG == "v0.0.0" ]]; then
          NEW_VERSION="v1.0.0"
        else
          # Extract version numbers and increment minor
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="v${MAJOR}.${NEW_MINOR}.0"
        fi
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Next version: $NEW_VERSION"

    - name: Check if release PR already exists
      if: steps.check_updates.outputs.dependency_commits > 0
      id: check_pr
      shell: bash
      run: |
        EXISTING_PR=$(gh pr list --base ${{ inputs.base-branch }} --head "zombie-release-${{ steps.version.outputs.new_version }}" --json number --jq '.[0].number // empty')
        if [[ -n "$EXISTING_PR" ]]; then
          echo "pr_exists=true" >> $GITHUB_OUTPUT
          echo "existing_pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          echo "Release PR already exists: #$EXISTING_PR"
        else
          echo "pr_exists=false" >> $GITHUB_OUTPUT
          echo "No existing release PR found"
        fi
      env:
        GH_TOKEN: ${{ inputs.token }}

    - name: Create release branch and update version
      if: steps.check_updates.outputs.dependency_commits > 0 && steps.check_pr.outputs.pr_exists == 'false'
      shell: bash
      run: |
        NEW_VERSION="${{ steps.version.outputs.new_version }}"
        BRANCH_NAME="zombie-release-$NEW_VERSION"
        
        # Check if branch exists remotely and delete it
        if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
          echo "Remote branch $BRANCH_NAME exists, deleting it..."
          git push origin --delete "$BRANCH_NAME" || echo "Failed to delete remote branch, continuing..."
        fi
        
        # Delete local branch if it exists
        if git show-ref --verify --quiet "refs/heads/$BRANCH_NAME"; then
          echo "Local branch $BRANCH_NAME exists, deleting it..."
          git branch -D "$BRANCH_NAME"
        fi
        
        # Create release branch
        git checkout -b "$BRANCH_NAME"
        
        # Update version in specified file if it exists
        if [ -f "${{ inputs.version-file }}" ]; then
          if [[ "${{ inputs.version-file }}" == "pom.xml" ]]; then
            MAVEN_VERSION=${NEW_VERSION#v}  # Remove 'v' prefix for Maven
            if command -v mvn &> /dev/null; then
              mvn versions:set -DnewVersion=$MAVEN_VERSION -DgenerateBackupPoms=false || echo "Maven version update failed, continuing..."
            else
              echo "Maven not available, skipping version update"
            fi
          fi
        
          if [ -f "${{ inputs.version-file }}" ]; then
            git add ${{ inputs.version-file }}
            git commit -m "Update version to ${NEW_VERSION#v}" || echo "No changes to commit"
          fi
        fi
        
        # Push the branch
        git push origin "zombie-release-$NEW_VERSION"

    - name: Create release PR
      if: steps.check_updates.outputs.dependency_commits > 0 && steps.check_pr.outputs.pr_exists == 'false'
      id: create-pr
      shell: bash
      run: |
        NEW_VERSION="${{ steps.version.outputs.new_version }}"
        LATEST_TAG="${{ steps.latest_release.outputs.latest_tag }}"
        
        # Generate changelog of dependency updates
        CHANGES=$(git log $LATEST_TAG..HEAD --oneline --grep="Bump\|dependabot" --pretty=format:"- %s" | head -20)
        
        # Calculate auto-merge date
        AUTO_MERGE_DATE=$(date -d '+${{ inputs.auto-merge-days }} days' '+%Y-%m-%d %H:%M UTC')
        
        # Create PR body
        PR_BODY="Zombie Release: $NEW_VERSION - Dependencies updated since $LATEST_TAG - Auto-merge: $AUTO_MERGE_DATE"
        
        # Create the PR
        PR_NUMBER=$(gh pr create \
          --title "Zombie Release: $NEW_VERSION" \
          --body "$PR_BODY" \
          --base ${{ inputs.base-branch }} \
          --head "zombie-release-$NEW_VERSION" \
          --label "zombie-mode,dependencies,auto-merge" \
          --json number \
          --jq '.number')
        
        echo "release-created=true" >> $GITHUB_OUTPUT
        echo "pr-number=$PR_NUMBER" >> $GITHUB_OUTPUT
        echo "Created release PR #$PR_NUMBER for $NEW_VERSION"
      env:
        GH_TOKEN: ${{ inputs.token }}

    - name: No Release Needed
      if: steps.check_updates.outputs.dependency_commits == 0
      shell: bash
      run: |
        echo "No dependency updates found, no release needed"
        echo "release-created=false" >> $GITHUB_OUTPUT