name: 'Zombie Auto-merge'
description: 'Merge open zombie-mode release PRs older than age-days. Use age-days=0 on release day to merge immediately.'

inputs:
  token:
    description: 'GitHub token for authentication'
    required: true
  age-days:
    description: 'Merge PRs created more than N days ago. 0 = merge open zombie PRs immediately.'
    required: true
  merge-method:
    description: 'Merge strategy: merge | squash | rebase'
    required: false
    default: 'squash'
  delete-branch:
    description: 'Delete the release branch after a successful merge'
    required: false
    default: 'true'
  target-branch:
    description: 'Target branch to filter PRs by (must match the base-branch used in prepare-pr)'
    required: false
    default: 'main'
  label:
    description: 'Label that identifies zombie-mode release PRs'
    required: false
    default: 'zombie-mode'

outputs:
  merged-count:
    description: 'Number of PRs merged'
    value: ${{ steps.auto-merge.outputs.merged-count }}
  merged-prs:
    description: 'Comma-separated list of merged PR numbers'
    value: ${{ steps.auto-merge.outputs.merged-prs }}

runs:
  using: 'composite'
  steps:
    - name: Auto-merge aged zombie release PRs
      id: auto-merge
      shell: bash
      run: |
        # GNU date required (ubuntu-latest provides this)
        CUTOFF_DATE=$(date -d '${{ inputs.age-days }} days ago' --iso-8601=seconds)
        echo "Merging zombie-mode PRs older than ${{ inputs.age-days }} day(s) (cutoff: $CUTOFF_DATE)..."

        AGED_PRS=$(gh pr list \
          --base "${{ inputs.target-branch }}" \
          --label "${{ inputs.label }}" \
          --state "open" \
          --json number,createdAt \
          --jq --arg cutoff "$CUTOFF_DATE" \
          '.[] | select(.createdAt <= $cutoff) | .number')

        if [ -z "$AGED_PRS" ]; then
          echo "No qualifying zombie-mode PRs found."
          echo "merged-count=0" >> $GITHUB_OUTPUT
          echo "merged-prs="    >> $GITHUB_OUTPUT
          exit 0
        fi

        MERGED_COUNT=0
        MERGED_PRS=""

        while IFS= read -r pr_number; do
          [ -z "$pr_number" ] && continue

          gh pr comment "$pr_number" \
            --body "Auto-merging after ${{ inputs.age-days }}-day timeout. Triggered by zombie-mode scheduled workflow."

          MERGE_CMD="gh pr merge $pr_number --${{ inputs.merge-method }}"
          [[ "${{ inputs.delete-branch }}" == "true" ]] && MERGE_CMD="$MERGE_CMD --delete-branch"

          if eval "$MERGE_CMD"; then
            MERGED_COUNT=$((MERGED_COUNT + 1))
            MERGED_PRS="${MERGED_PRS:+${MERGED_PRS},}${pr_number}"
            echo "Merged PR #$pr_number"
          else
            echo "Failed to merge PR #$pr_number — skipping"
          fi
        done <<< "$AGED_PRS"

        echo "merged-count=$MERGED_COUNT" >> $GITHUB_OUTPUT
        echo "merged-prs=$MERGED_PRS"     >> $GITHUB_OUTPUT
        echo "Done. Merged $MERGED_COUNT PR(s)."
      env:
        GH_TOKEN: ${{ inputs.token }}
