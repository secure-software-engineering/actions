name: Publish Javadoc
description: 'Generates and publishes Javadoc to GitHub Pages'

inputs:
  java_version:
    description: 'Java version to use'
    required: false
    default: '17'
  java_distribution:
    description: 'Java distribution to use'
    required: false
    default: 'temurin'
  develop_branch:
    description: 'Branch to use for latest documentation'
    required: false
    default: 'develop'
  version:
    description: 'Version to use for documentation (if not provided, will be determined from the event)'
    required: false
    default: ''
  token:
    description: 'GitHub token for authentication'
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: ${{ inputs.java_version }}
        distribution: ${{ inputs.java_distribution }}

    - name: Generate Javadoc
      shell: bash
      run: mvn javadoc:javadoc

    - name: Determine documentation version
      id: version
      shell: bash
      run: |
        if [[ -n "${{ inputs.version }}" ]]; then
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Publish Javadoc
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ inputs.token }}
        publish_dir: target/site/apidocs
        destination_dir: apidocs/${{ steps.version.outputs.version }}

    - name: Update latest symlink
      if: github.ref_name == inputs.develop_branch
      shell: bash
      run: |
        git clone --branch=gh-pages https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository }}.git gh-pages
        cd gh-pages
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        
        # Update latest directory
        rm -rf apidocs/latest
        cd apidocs
        ln -s ./${{ github.ref_name }} latest
        cd ..
        
        git add apidocs/latest
        git commit -m "Update latest symlink to point to ${{ github.ref_name }}" || echo "No changes to commit"
        git push origin gh-pages