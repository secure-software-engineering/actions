name: Publish Javadoc
description: 'Generates and publishes Javadoc to GitHub Pages'

inputs:
  path:
    description: 'Path to use for documentation, will be sanitized to represent a filename'
    required: true
  token:
    description: 'GitHub token for authentication'
    required: true
  java_version:
    description: 'Java version to use'
    required: false
    default: '17'
  java_distribution:
    description: 'Java distribution to use'
    required: false
    default: 'temurin'
  latest_branch:
    description: 'Branch that contains the *latest* documentation enabling updates in that directory'
    required: false
    default: 'develop'

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java_version }}
        distribution: ${{ inputs.java_distribution }}

    - name: Generate Javadoc
      shell: bash
      run: mvn javadoc:javadoc

    - name: sanitize input path
      shell: bash
      run: |
          echo PATH=$("${{ inputs.path }}| sed "s/[^a-zA-Z0-9._-]/_/g") >> $GITHUB_ENV

    - name: Publish Javadoc
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ inputs.token }}
        publish_dir: target/site/apidocs
        destination_dir: apidocs/${{ env.PATH }}

    - name: Update *latest* documentation
      if: github.ref_name == inputs.latest_branch
      shell: bash
      run: |
        git clone --branch=gh-pages https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository }}.git gh-pages
        cd gh-pages
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Update latest directory
        rm -rf apidocs/latest
        cd apidocs
        ln -s ./${{ env.PATH }} latest
        cd ..
        
        git add apidocs/latest
        git commit -m "Update latest symlink to point to ${{ env.PATH }}" || echo "No changes to commit"
        git push origin gh-pages